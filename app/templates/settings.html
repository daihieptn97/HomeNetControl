{% extends "base.html" %}
{% block content %}
<section class="two-column">
  <form class="panel form-panel" id="settings-form">
    <h2>Cài đặt quét mạng</h2>
    <label>Interface mạng<input name="network_interface" placeholder="eth0 hoặc wlan0"></label>
    <label>Subnet<input name="network_subnet" placeholder="192.168.1.0/24"></label>
    <label>Chu kỳ quét (giây)<input name="scan_interval_seconds" type="number" min="15" step="1"></label>
    <label class="checkbox"><input name="mock_data" type="checkbox"> Dùng fallback/mock khi thiếu tool</label>
    <button class="primary" type="submit">Lưu cài đặt</button>
  </form>
  <div class="panel">
    <h2>System tools</h2>
    <div id="tools-list" class="tool-list"></div>
  </div>
</section>
<section class="panel stack">
  <div class="panel-header">
    <h2>Update code</h2>
    <button id="app-update" class="primary" type="button">Update mới</button>
  </div>
  <dl class="kv">
    <dt>Repo</dt><dd id="update-repo">-</dd>
    <dt>Branch</dt><dd id="update-branch">-</dd>
    <dt>Phiên bản hiện tại</dt><dd id="update-current">-</dd>
    <dt>Phiên bản mới</dt><dd id="update-latest">-</dd>
    <dt>Trạng thái</dt><dd id="update-state">-</dd>
  </dl>
  <div class="two-column">
    <div>
      <h2>Git log hiện tại</h2>
      <pre id="update-current-log" class="log-box">-</pre>
    </div>
    <div>
      <h2>Git log phiên bản mới</h2>
      <pre id="update-latest-log" class="log-box">-</pre>
    </div>
  </div>
</section>
{% endblock %}
