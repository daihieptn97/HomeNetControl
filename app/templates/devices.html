{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="panel-header">
    <h2>Danh sách thiết bị</h2>
    <span id="device-count" class="pill">0 thiết bị</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Trạng thái</th>
          <th>Tên</th>
          <th>IP</th>
          <th>MAC</th>
          <th>Nhà sản xuất</th>
          <th>Ghi chú</th>
          <th>Đã biết</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="devices-table"></tbody>
    </table>
  </div>
</section>
<section class="panel">
  <div class="panel-header">
    <h2>Mạng con đã từng kết nối</h2>
    <span id="subnet-count" class="pill">0 subnet</span>
  </div>
  <div class="table-wrap">
    <table class="compact-table">
      <thead>
        <tr>
          <th>Subnet</th>
          <th>Interface</th>
          <th>SSID</th>
          <th>Lần thấy gần nhất</th>
          <th>Lần quét gần nhất</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="subnets-table"></tbody>
    </table>
  </div>
</section>
{% endblock %}
